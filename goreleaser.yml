version: 2

project_name: logr

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: logr
    main: ./main.go
    binary: logr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # windows/arm64 is excluded because it has limited CI runner support.
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/saurabh/logr/cmd.Version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: logr-archive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: saurabh228
    name: logr
  draft: false
  prerelease: auto
  name_template: "logr {{.Version}}"
